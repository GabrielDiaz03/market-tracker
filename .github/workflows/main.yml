name: Wallapop Seiko 5 Monitor

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del repositorio
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          # Aquí NO debe haber ninguna línea de 'cache'

      - name: Instalar dependencias
        run: npm install

      - name: Ejecutar script de búsqueda
        run: node scraper.js
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}

      - name: Guardar historial actualizado
        run: |
          git config --global user.name "Wallapop Bot"
          git config --global user.email "bot@github.com"
          git add history.json
          git commit -m "Update history [skip ci]" || echo "No hay cambios"
          git push