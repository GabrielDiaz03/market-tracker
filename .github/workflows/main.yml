name: Seiko Monitor Playwright

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  ejecutar_rastreo:
    runs-on: ubuntu-latest

    steps:
      - name: Descargar código
        uses: actions/checkout@v4

      - name: Instalar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Instalar librerías
        run: npm install

      - name: Instalar navegador Chromium
        run: npx playwright install --with-deps chromium

      - name: Ejecutar Bot
        run: node scraper.js
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        continue-on-error: true  # Permite que el workflow continúe aunque falle el bot

      - name: Subir capturas de error
        if: always()  # Se ejecuta siempre, incluso si falló el paso anterior
        uses: actions/upload-artifact@v4
        with:
          name: debug-artifacts
          path: |
            debug_error_*.png
            debug_error_*.html
          if-no-files-found: ignore